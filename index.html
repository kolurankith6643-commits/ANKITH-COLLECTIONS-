<!DOCTYPE html>
<html>
<head>
    <title>Ankith Collections - School Uniforms Jigani</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }
        h1 { 
            color: white; 
            margin: 20px 0 10px 0; 
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            color: #e0e0e0;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .box { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            margin: 20px auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
        }
        .gallery img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }
        .btn {
            background: #25D366;
            color: white;
            padding: 15px 35px;
            text-decoration: none;
            border-radius: 8px;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }
        .location {
            color: #333;
            font-size: 16px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ankith Collections</h1>
        <p class="subtitle">Uniform Manufacturer & Supplier - Jigani</p>
        
        <div class="box">
            <h2 style="color: #1a5fb4;">Our School Uniform Collection</h2>
            <div class="gallery">
                <div class="item"><img src="page1.png" alt="Uniform 1"></div>
                <div class="item"><img src="page2.png" alt="Uniform 2"></div>
                <div class="item"><img src="uniform3.jpg" alt="Uniform 3"></div>
                <div class="item"><img src="uniform4.jpg" alt="Uniform 4"></div>
                <div class="item"><img src="uniform5.jpg" alt="Uniform 5"></div>
                <div class="item"><img src="uniform6.jpg" alt="Uniform 6"></div>
            </div>
        </div>

        <div class="box">
            <p><strong>📍 Jigani, Bangalore</strong></p>
            <p class="location">We supply uniforms for all schools</p>
            <p style="color: #333; font-size: 18px;"><strong>📞 Call/WhatsApp: 8904191436</strong></p>
            <a href="https://wa.me/918904191436" class="btn">Order on WhatsApp</a>
        </div>
    </div>
</body>
</html>
