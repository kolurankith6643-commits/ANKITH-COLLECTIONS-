<!DOCTYPE html>
<html>
<head>
    <title>Ankith Collections - School Uniforms</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        h1 { 
            color: white; 
            margin-top: 30px;

        p { 
            font-size: 18px;

            background: white;

        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .gallery img {
            width: 100%;
            max-width: 350px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .btn {
            background: #25D366;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 16px;

        <div class="box">

            <p style="color: #333;">📞 Call/WhatsApp: 8904191436</p>
            <a href="https://wa.me/918904191436" class="btn">Message on WhatsApp</a>
            <p style="font-size: 14px; margin-top: 20px; color: #666;">We supply uniforms for all schools</p>
        </div>
    </div>
</body>
</html>
