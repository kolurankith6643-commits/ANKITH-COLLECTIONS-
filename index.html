<!DOCTYPE html>
<html>
<head>
    <title>Ankith Collections - School Uniforms Jigani</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 0; 
            margin: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }
        .banner {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: block;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .box { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            margin: 20px auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .gallery img {
            width: 100%;
            border-radius: 10px;
            border: 3px solid #f0f0f0;
        }
        .btn {
            background: #25D366;
            color: white;
            padding: 15px 35px;
            text-decoration: none;
            border-radius: 8px;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- Main Banner -->
    <img src="page1.png" alt="Ankith Collections" class="banner">
    
    <div class="container">
        <!-- Products List -->
        <div class="box">
            <h2 style="color: #1a5fb4;">Our Products</h2>
            <img src="page2.png" alt="Product List" style="width:100%; border-radius:10px;">
        </div>

        <!-- Contact -->
        <div class="box">
            <p><strong>📍 Jigani, Bangalore</strong></p>
            <p style="color: #333;">We supply uniforms for all schools</p>
            <p style="color: #333; font-size: 18px;"><strong>📞 Call/WhatsApp: 8904191436</strong></p>
            <a href="https://wa.me/918904191436" class="btn">Order on WhatsApp</a>
        </div>
    </div>
</body>
</html>
